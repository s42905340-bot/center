<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>IDEA Center Pro | نظام الإدارة المتكامل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-color: #2c3e50; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .sidebar { background: var(--main-color); color: white; min-height: 100vh; padding: 20px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-gold { background: #f39c12; color: white; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- القائمة الجانبية -->
        <div class="col-md-2 sidebar">
            <h3>IDEA Pro</h3>
            <hr>
            <p>لوحة التحكم</p>
        </div>

        <!-- المحتوى الرئيسي -->
        <div class="col-md-10 p-4">
            <h2 class="mb-4">مرحباً بك في نظام الإدارة الاحترافي</h2>
            
            <div class="row">
                <!-- الإحصائيات -->
                <div class="col-md-8">
                    <div class="card p-4">
                        <h4>إحصائيات المتابعة</h4>
                        <canvas id="myChart"></canvas>
                    </div>
                </div>
                <!-- الحجز السريع -->
                <div class="col-md-4">
                    <div class="card p-4 bg-primary text-white">
                        <h4>حجز سريع</h4>
                        <input type="text" class="form-control mb-2" id="sName" placeholder="اسم الطالب">
                        <button class="btn btn-gold w-100" onclick="alert('تم الحجز!')">تأكيد</button>
                    </div>
                </div>
            </div>

            <!-- جدول البيانات (الميزة اللي طلبتيها) -->
            <div class="card p-4 mt-4">
                <h4>سجل الطلبة (الاسم، موبايل الطالب، موبايل ولي الأمر)</h4>
                <table class="table mt-3">
                    <thead><tr><th>الاسم</th><th>موبايل الطالب</th><th>موبايل ولي الأمر</th><th>حذف</th></tr></thead>
                    <tbody id="studentBody"></tbody>
                </table>
                <button class="btn btn-success" onclick="addFullStudent()">إضافة طالب جديد +</button>
            </div>
        </div>
    </div>
</div>

<script>
    // الرسم البياني
    new Chart(document.getElementById('myChart'), {
        type: 'line',
        data: { labels: ['يناير', 'فبراير', 'مارس'], datasets: [{ label: 'الطلبة الجدد', data: [5, 10, 15], borderColor: '#3498db' }] }
    });

    // إضافة طالب
    function addFullStudent() {
        let name = prompt("اسم الطالب:");
        let sPhone = prompt("موبايل الطالب:");
        let pPhone = prompt("موبايل ولي الأمر:");
        if (!name) return;
        let tbody = document.getElementById("studentBody");
        tbody.innerHTML += `<tr><td>${name}</td><td>${sPhone}</td><td>${pPhone}</td><td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">X</button></td></tr>`;
    }
</script>

</body>
</html>
