<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IDEA Pro Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; }
        .card { border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-custom { margin: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-primary">💡 IDEA Management Pro</h2>
    
    <div class="card p-4">
        <h4>Teachers <button class="btn btn-success" onclick="add('t')">+ Add</button></h4>
        <ul id="tList" class="list-group"></ul>
    </div>

    <div class="card p-4">
        <h4>Students <button class="btn btn-success" onclick="add('s')">+ Add</button></h4>
        <ul id="sList" class="list-group"></ul>
    </div>
</div>

<script>
    function add(type) {
        let name = prompt("Name:");
        if (!name) return;
        let list = document.getElementById(type === 't' ? 'tList' : 'sList');
        let li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between";
        li.innerHTML = `<span>${name}</span> 
        <div>
            <button class="btn btn-sm btn-warning" onclick="edit(this)">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="this.parentElement.parentElement.remove()">Del</button>
        </div>`;
        list.appendChild(li);
    }
    function edit(btn) {
        let span = btn.parentElement.parentElement.querySelector('span');
        let n = prompt("Edit:", span.textContent);
        if (n) span.textContent = n;
    }
</script>
</body>
</html>
