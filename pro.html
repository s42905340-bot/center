<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>IDEA Center Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 30px; font-family: sans-serif; }
        .card { border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-box { background: #0d6efd; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box text-center">
        <h2>نظام إدارة IDEA Center</h2>
        <h5>إجمالي عدد الطلبة: <span id="count">0</span></h5>
    </div>

    <div class="card p-4">
        <button class="btn btn-primary mb-3" onclick="addStudent()">+ إضافة طالب جديد</button>
        <table class="table table-bordered text-center">
            <thead class="table-light">
                <tr>
                    <th>اسم الطالب</th>
                    <th>رقم موبايل الطالب</th>
                    <th>رقم ولي الأمر</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>
</div>

<script>
    function addStudent() {
        let name = prompt("اسم الطالب:");
        let phone = prompt("رقم موبايل الطالب:");
        let parentPhone = prompt("رقم ولي الأمر:");
        
        if (!name) return;

        let tbody = document.getElementById("studentTable");
        let row = tbody.insertRow();
        row.innerHTML = `
            <td>${name}</td>
            <td>${phone}</td>
            <td>${parentPhone}</td>
            <td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove(); updateCount();">حذف</button></td>
        `;
        updateCount();
    }

    function updateCount() {
        let count = document.getElementById("studentTable").rows.length;
        document.getElementById("count").textContent = count;
    }
</script>

</body>
</html>
