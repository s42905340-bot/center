<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>IDEA Center Final System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center text-primary mb-4">نظام إدارة IDEA Center الشامل</h1>

    <!-- 1. الرسم البياني -->
    <div class="card p-4">
        <h4>إحصائيات الطلبة</h4>
        <canvas id="myChart"></canvas>
    </div>

    <!-- 2. المدرسين والطلبة -->
    <div class="row">
        <div class="col-md-6">
            <div class="card p-4">
                <h4>المعلمون <button class="btn btn-success btn-sm" onclick="add('tList')">إضافة +</button></h4>
                <ul id="tList" class="list-group"></ul>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4">
                <h4>الطلبة <button class="btn btn-success btn-sm" onclick="add('sList')">إضافة +</button></h4>
                <ul id="sList" class="list-group"></ul>
            </div>
        </div>
    </div>

    <!-- 3. فورم الحجز -->
    <div class="card p-4">
        <h4>نموذج حجز حصة</h4>
        <form id="bookingForm">
            <input type="text" class="form-control mb-2" id="studentName" placeholder="اسم الطالب" required>
            <input type="text" class="form-control mb-2" id="subjectName" placeholder="المادة" required>
            <button type="submit" class="btn btn-primary">تأكيد الحجز</button>
        </form>
    </div>
</div>

<script>
    // الرسم البياني
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, { type: 'bar', data: { labels: ['ابتدائي', 'إعدادي', 'ثانوي'], datasets: [{ label: 'عدد الطلبة', data: [5, 10, 15], backgroundColor: '#0d6efd' }] } });

    // الإضافة والحذف
    function add(listId) {
        let name = prompt("ادخل الاسم:");
        if (!name) return;
        let ul = document.getElementById(listId);
        let li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between align-items-center";
        li.innerHTML = `<span>${name}</span> <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">حذف</button>`;
        ul.appendChild(li);
    }

    // الحجز
    document.getElementById('bookingForm').addEventListener('submit', (e) => {
        e.preventDefault();
        alert("تم حجز الحصة بنجاح!");
    });
</script>

</body>
</html>
