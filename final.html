<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>IDEA Center Pro System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center text-primary mb-4">قاعدة بيانات الطلبة</h2>

    <div class="card p-4">
        <h4>إضافة طالب جديد <button class="btn btn-success btn-sm" onclick="addStudent()">إضافة +</button></h4>
        <table class="table mt-3">
            <thead>
                <tr>
                    <th>اسم الطالب</th>
                    <th>رقم الطالب</th>
                    <th>رقم ولي الأمر</th>
                    <th>تحكم</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>
</div>

<script>
    function addStudent() {
        let name = prompt("اسم الطالب:");
        let phone = prompt("رقم موبايل الطالب:");
        let parentPhone = prompt("رقم موبايل ولي الأمر:");
        
        if (!name) return;

        let tbody = document.getElementById("studentTable");
        let row = document.createElement("tr");
        row.innerHTML = `
            <td>${name}</td>
            <td>${phone}</td>
            <td>${parentPhone}</td>
            <td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">حذف</button></td>
        `;
        tbody.appendChild(row);
    }
</script>

</body>
</html>
