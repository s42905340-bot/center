<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEA Center Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <h2 class="mb-4 text-primary">💡 IDEA Center Management System</h2>

    <!-- الأزرار -->
    <div class="card p-4 mb-4">
        <h4>Teachers <button class="btn btn-sm btn-success" onclick="addTeacher()">+ Add Teacher</button></h4>
        <ul id="teachersList" class="list-group mt-2"></ul>
    </div>

    <div class="card p-4 mb-4">
        <h4>Students <button class="btn btn-sm btn-success" onclick="addStudent()">+ Add Student</button></h4>
        <ul id="studentsList" class="list-group mt-2"></ul>
    </div>

    <!-- القائمة المنسدلة -->
    <div class="card p-4">
        <h4>School Grades</h4>
        <select class="form-select" id="gradeSelect">
            <option>Primary 1-6</option>
            <option>Preparatory 1-3</option>
            <option>Secondary 1</option>
            <option>Secondary 2</option>
            <option>Secondary 3</option>
        </select>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
