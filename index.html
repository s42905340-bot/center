<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة السنتر الاحترافي</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginPage" class="card">
        <h2>تسجيل الدخول</h2>
        <input type="password" id="passInput" placeholder="كلمة المرور (1234)">
        <button onclick="checkLogin()">دخول</button>
    </div>
    <div class="card">
    <h3>تغيير كلمة المرور</h3>
    <input type="password" id="newPass" placeholder="كلمة المرور الجديدة">
    <button onclick="changePassword()">حفظ الباسورد الجديد</button>
</div>

<script>
    function changePassword() {
        let newPass = document.getElementById('newPass').value;
        if(newPass) {
            localStorage.setItem('myCenterPass', newPass);
            alert("تم تغيير كلمة المرور بنجاح! سيتم استخدامها في المرة القادمة.");
        }
    }
</script>

    <div id="mainContent" style="display: none;">
        <div class="card">
            <h3>الإحصائيات</h3>
            <p id="statsText"></p>
        </div>

        <div class="card">
            <h3>توزيع الطلاب على المجموعات</h3>
            <canvas id="myChart"></canvas>
        </div>
        
        <div class="card">
            <h2>إدارة المجموعات</h2>
            <input type="text" id="newGroupInput" placeholder="اسم المجموعة الجديدة">
            <button onclick="addGroup()">إضافة مجموعة</button>
            
            <hr>
            <div class="card">
    <h3>إعدادات الأمان</h3>
    <input type="password" id="newPassInput" placeholder="كلمة المرور الجديدة">
    <button onclick="changePassword()">حفظ الباسورد الجديد</button>
</div>
            
            <h2>إضافة طالب جديد</h2>
            <input type="text" id="studentName" placeholder="اسم الطالب">
            <input type="number" id="feesPaid" placeholder="المبلغ المدفوع">
            <select id="groupSelect"></select>
            <button onclick="addStudent()">إضافة طالب</button>
        </div>

        <div class="card">
            <input type="text" id="searchInput" placeholder="بحث عن طالب..." onkeyup="searchStudent()">
            <button onclick="window.print()" style="background: #e67e22;">طباعة كشف الطلاب</button>
            <table id="studentTable">
                <thead><tr><th>الاسم</th><th>المجموعة</th><th>المدفوع</th><th>إجراء</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
