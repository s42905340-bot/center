<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>IDEA Center Pro | الإدارة المتكاملة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .badge-count { background: #0d6efd; color: white; padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center text-primary mb-4">نظام إدارة IDEA Center المتكامل</h2>
    
    <!-- قسم الطلبة مع الغياب والاتصال -->
    <div class="card p-4">
        <h4>سجل الطلبة <button class="btn btn-success btn-sm" onclick="addStudent()">إضافة طالب +</button></h4>
        <table class="table table-striped mt-3">
            <thead><tr><th>الاسم</th><th>الصف</th><th>موبايل ولي الأمر</th><th>الحضور</th><th>إجراء</th></tr></thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>
</div>

<script>
    function addStudent() {
        let name = prompt("اسم الطالب:");
        let grade = prompt("الصف الدراسي:");
        let pPhone = prompt("رقم موبايل ولي الأمر:");
        if (!name) return;

        let tbody = document.getElementById("studentTable");
        let row = tbody.insertRow();
        row.innerHTML = `
            <td>${name}</td>
            <td>${grade}</td>
            <td>${pPhone}</td>
            <td>
                <select class="form-select form-select-sm">
                    <option>حاضر</option>
                    <option>غائب</option>
                </select>
            </td>
            <td>
                <a href="tel:${pPhone}" class="btn btn-info btn-sm">اتصال</a>
                <button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">حذف</button>
            </td>
        `;
    }
</script>

</body>
</html>
