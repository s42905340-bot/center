<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>IDEA Center Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding: 20px; font-family: sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center text-primary mb-4">نظام إدارة IDEA Center الاحترافي</h2>

    <!-- قسم المعلمين -->
    <div class="card p-4">
        <h4>المعلمون <button class="btn btn-success btn-sm" onclick="addItem('tTable')">إضافة معلم +</button></h4>
        <table class="table"><thead><tr><th>اسم المعلم</th><th>المادة</th><th>حذف</th></tr></thead><tbody id="tTable"></tbody></table>
    </div>

    <!-- قسم الطلبة -->
    <div class="card p-4">
        <h4>سجل الطلبة <button class="btn btn-success btn-sm" onclick="addStudent()">إضافة طالب +</button></h4>
        <table class="table"><thead><tr><th>الاسم</th><th>الصف الدراسي</th><th>موبايل الطالب</th><th>موبايل ولي الأمر</th><th>حذف</th></tr></thead><tbody id="sTable"></tbody></table>
    </div>
</div>

<script>
    // إضافة معلم
    function addItem(tableId) {
        let name = prompt("اسم المعلم:");
        let subject = prompt("المادة:");
        if (!name) return;
        document.getElementById(tableId).innerHTML += `<tr><td>${name}</td><td>${subject}</td><td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">حذف</button></td></tr>`;
    }

    // إضافة طالب
    function addStudent() {
        let name = prompt("اسم الطالب:");
        let grade = prompt("الصف الدراسي:");
        let sPhone = prompt("موبايل الطالب:");
        let pPhone = prompt("موبايل ولي الأمر:");
        if (!name) return;
        document.getElementById("sTable").innerHTML += `<tr><td>${name}</td><td>${grade}</td><td>${sPhone}</td><td>${pPhone}</td><td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">حذف</button></td></tr>`;
    }
</script>

</body>
</html>
