<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>IDEA Center Pro System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-primary mb-4 text-center">نظام إدارة IDEA Center المتكامل</h2>

    <!-- قسم الرسم البياني -->
    <div class="card p-4">
        <h4>إحصائيات الطلبة</h4>
        <canvas id="myChart" height="100"></canvas>
    </div>
    
    <!-- قسم المعلمين والطلبة -->
    <div class="row">
        <div class="col-md-6">
            <div class="card p-4">
                <h4>المعلمون <button class="btn btn-success btn-sm" onclick="addItem('tList')">إضافة +</button></h4>
                <ul id="tList" class="list-group mt-2"></ul>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4">
                <h4>الطلبة <button class="btn btn-success btn-sm" onclick="addItem('sList')">إضافة +</button></h4>
                <ul id="sList" class="list-group mt-2"></ul>
            </div>
        </div>
    </div>

    <!-- قسم فورم الحجز -->
    <div class="card p-4">
        <h4>نموذج حجز حصة</h4>
        <form id="bookingForm">
            <input type="text" class="form-control mb-2" placeholder="اسم الطالب" required>
            <input type="text" class="form-control mb-2" placeholder="المادة الدراسية" required>
            <button type="submit" class="btn btn-primary">تأكيد الحجز</button>
        </form>
    </div>
</div>

<script>
    // الرسم البياني
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['ابتدائي', 'إعدادي', 'ثانوي'],
            datasets: [{ label: 'عدد الطلبة', data: [12, 19, 3], backgroundColor: '#0d6efd' }]
        }
    });

    // وظائف الإضافة
    function addItem(listId) {
        let name = prompt("أدخل الاسم:");
        if (!name) return;
        let ul = document.getElementById(listId);
        let li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between";
        li.innerHTML = `<span>${name}</span> <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">حذف</button>`;
        ul.appendChild(li);
    }

    // فورم الحجز
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert("تم استلام طلب الحجز بنجاح!");
    });
</script>

</body>
</html>
