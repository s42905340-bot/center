<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>IDEA Center Pro | نظام الإدارة المتكامل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center text-primary mb-4">نظام إدارة IDEA Center المتكامل</h2>
    
    <!-- قسم الإحصائيات -->
    <div class="card p-4">
        <h4>إحصائيات المركز</h4>
        <canvas id="myChart" height="80"></canvas>
    </div>

    <!-- قسم الطلبة -->
    <div class="card p-4">
        <h4>سجل بيانات الطلبة <button class="btn btn-success btn-sm" onclick="addStudent()">إضافة طالب +</button></h4>
        <table class="table table-bordered mt-3">
            <thead><tr><th>الاسم</th><th>موبايل الطالب</th><th>موبايل ولي الأمر</th><th>حذف</th></tr></thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>

    <!-- قسم الحجز -->
    <div class="card p-4">
        <h4>نموذج حجز حصة</h4>
        <form onsubmit="event.preventDefault(); alert('تم الحجز بنجاح!');">
            <input type="text" class="form-control mb-2" placeholder="اسم الطالب" required>
            <button type="submit" class="btn btn-primary">تأكيد الحجز</button>
        </form>
    </div>
</div>

<script>
    // الرسم البياني
    new Chart(document.getElementById('myChart'), {
        type: 'bar',
        data: { labels: ['الطلبة', 'المعلمين', 'الحجوزات'], datasets: [{ label: 'العدد', data: [10, 5, 20], backgroundColor: '#0d6efd' }] }
    });

    // إضافة طالب
    function addStudent() {
        let name = prompt("اسم الطالب:");
        let phone = prompt("رقم الطالب:");
        let pPhone = prompt("رقم ولي الأمر:");
        if (!name) return;
        document.getElementById("studentTable").innerHTML += `<tr><td>${name}</td><td>${phone}</td><td>${pPhone}</td><td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">حذف</button></td></tr>`;
    }
</script>

</body>
</html>
